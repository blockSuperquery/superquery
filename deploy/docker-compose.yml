# Simplified single-box deployment: Postgres + indexer node + GraphQL query service.
# Everything builds from this repo — no registry, no k8s.
#
#   ./start.sh            one-command bootstrap (scaffolds a starter project, builds, runs)
#   docker compose up -d  if ./project is already in place
#
# The indexer expects a built SubQuery project (schema.graphql + manifest + dist/)
# mounted at /app. Put yours in ./project or set PROJECT_DIR.

services:
  postgres:
    build:
      context: ../packages/node/docker
      dockerfile: pg-Dockerfile # postgres:16-alpine + btree_gist extension (needed for historical state)
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  subquery-node:
    build:
      context: ..
      dockerfile: packages/node/Dockerfile
    # To skip the local build and use the published image instead:
    # image: subquerynetwork/subql-node-substrate:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASS:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ${PROJECT_DIR:-./project}:/app
    command:
      - -f=/app
      - --db-schema=app
      - --workers=${WORKERS:-2}
      - --batch-size=${BATCH_SIZE:-10}
      - --unfinalized-blocks=true
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://subquery-node:3000/ready']
      interval: 3s
      timeout: 5s
      retries: 10

  graphql-engine:
    build:
      context: ..
      dockerfile: packages/query/Dockerfile
    # To skip the local build and use the published image instead:
    # image: subquerynetwork/subql-query:latest
    restart: unless-stopped
    ports:
      - '${QUERY_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      subquery-node:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASS: ${DB_PASS:-postgres}
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    command:
      - --name=app
      - --playground

volumes:
  postgres-data:
